---
$schema: https://raw.githubusercontent.com/streetsidesoftware/cspell/main/cspell.schema.json
version: "0.2"

# Import dictionaries from npm packages
import:
  - "@cspell/dict-ru_ru/cspell-ext.json"

# Languages
language: ru,en
languageSettings:
  - languageId: latex
    locale: ru

# Dictionaries
dictionaries:
  # Языковые словари
  - ru-ru
  - en-gb
  # Встроенные словари
  - coding-compound-terms
  - companies
  - computing-acronyms
  - data-science
  - data-science-models
  - data-science-tools
  - dotnet
  - en-common-misspellings
  - en-gb-common-misspellings
  - filetypes
  - google
  - latex
  - networking-terms
  - public-licenses
  - shellscript
  - software-term-suggestions
  - software-terms-alternative
  - software-tools
  - softwareTerms
  # LaTeX словари
  - latex-custom
  # IT и программные термины
  - software-terms
  - companies
  - filetypes
  - it-terms
  # Специализированные словари проекта
  - names
  - companies-products
  - data-units
  - misc

dictionaryDefinitions:
  # Словарь IT-терминов (информатика, теория информации, булева алгебра)
  - name: it-terms
    path: ./.cspell/it-terms.txt
    addWords: true
  # LaTeX-команды и переменные проекта
  - name: latex-custom
    path: ./.cspell/latex.txt
    addWords: true
  # Имена собственные (фамилии учёных, имена)
  - name: names
    path: ./.cspell/names.txt
    addWords: true
  # Названия компаний и продуктов
  - name: companies-products
    path: ./.cspell/companies-products.txt
    addWords: true
  # Единицы измерения данных
  - name: data-units
    path: ./.cspell/data-units.txt
    addWords: true
  # Разные термины (Копилефт, трит, исторические названия)
  - name: misc
    path: ./.cspell/misc.txt
    addWords: true

# Files to check
files:
  - "**/*.tex"
  - "**/*.bib"
  - "**/*.md"

# Files to ignore
ignorePaths:
  - "**/*.aux"
  - "**/*.bbl"
  - "**/*.bcf"
  - "**/*.blg"
  - "**/*.fdb_latexmk"
  - "**/*.fls"
  - "**/*.log"
  - "**/*.out"
  - "**/*.run.xml"
  - "**/*.synctex.gz"
  - "**/*.toc"
  - "**/*.lof"
  - "**/*.lot"
  - "**/*.nav"
  - "**/*.snm"
  - "**/*.vrb"
  - "**/*.idx"
  - "**/*.ind"
  - "**/*.glo"
  - "**/*.ist"
  - "**/*.ilg"
  - "**/*.tdo"
  - "**/*.cut"
  - "**/*.map"
  - "**/*.xyc"
  - "**/*.log.gz"
  - "**/build/"
  - "**/dist/"
  - ".git/"

useGitignore: true

# Enable filetypes
enableFiletypes:
  - latex
  - bibtex

# Patterns to ignore
patterns:
  - name: latex-commands
    pattern: /\\[a-zA-Z]+/g
  - name: latex-labels
    pattern: /\\(label|ref|cref|Cref|eqref|autoref)\{[^}]*\}/g
  - name: latex-citations
    pattern: /\\(cite|parencite|textcite|footcite|footfullcite)\{[^}]*\}/g
  - name: latex-urls
    pattern: /\\url\{[^}]*\}/g
  - name: latex-filenames
    pattern: /\\(input|include|includegraphics|addbibresource)\{[^}]*\}/g

ignoreRegExpList:
  - latex-commands
  - latex-labels
  - latex-citations
  - latex-urls
  - latex-filenames
