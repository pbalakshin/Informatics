name: Build LaTeX PDF

on:
  push:
    branches: [master, main]
    paths:
      - "Book/**"
      - ".github/workflows/build.yml"

  pull_request:
    branches: [master, main]
    paths:
      - "Book/**"
      - ".github/workflows/build.yml"

  workflow_dispatch: # Ручной запуск

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      pdf_name: ${{ steps.build.outputs.pdf_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true

      - name: Cache build directory
        id: cache-build
        uses: actions/cache@v4
        with:
          path: |
            Book/build
            Book/_minted-*
          key: ${{ runner.os }}-build-${{ hashFiles('Book/**/*.tex', 'Book/**/*.bib') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: Book
          compiler: latexmk
          args: "-pdf -jobname=informatics"
          extra_system_packages: "inkscape"
          latexmk_shell_escape: true

      - name: Show detailed error log
        if: failure()
        run: |
          grep -iE "error|fatal|undefined|not found|cannot find|missing|can't write" \
            Book/build/informatics.log || true

      - name: Show full log
        if: failure()
        run: |
          cat Book/build/informatics.log || true

      - name: Check for undefined references
        run: |
          if grep -qi "Reference.*undefined" Book/build/informatics.log; then
            echo "❌ Failed references!"
            grep -i "Reference.*undefined" Book/build/informatics.log
            exit 1
          fi
          if grep -qi "Citation.*undefined" Book/build/informatics.log; then
            echo "❌ Failed citations!"
            grep -i "Citation.*undefined" Book/build/informatics.log
            exit 1
          fi
          echo "✅ All references are correct"

      - name: Check for duplicate labels
        run: |
          DUPLICATES=$(grep -roh '\\label{[^}]*}' Book/ --include="*.tex" | sort | uniq -d)

          if [ -n "$DUPLICATES" ]; then
            echo "❌ Duplicate labels found:"
            echo "$DUPLICATES"
            exit 1
          else
            echo "✅ All labels are unique"
          fi

          if grep -q "multiply defined" Book/build/informatics.log; then
            echo "❌ Latex reported multiply defined labels!"
            grep "multiply defined" Book/build/informatics.log
            exit 1
          fi

      - name: Upload PDF artifact
        id: upload_pdf
        uses: actions/upload-artifact@v4
        with:
          name: informatics-pdf
          path: Book/build/informatics.pdf
          retention-days: 30
          if-no-files-found: error

      - name: Update PR comment with latest PDF
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload_pdf.outputs.artifact-url }}
        with:
          script: |
            const marker = '<!-- pr-pdf-comment -->';
            const body = [
              marker,
              '## Latest PDF',
              '',
              `[📥 Download the latest PDF](${process.env.ARTIFACT_URL})`,
              '',
              '> The artifact contains `informatics.pdf` and available for 30 days.',
              '> This comment is updated on every new CI run.',
            ].join('\n');

            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });

      # - name: Commit and push PDF
      #   uses: stefanzweifel/git-auto-commit-action@v5
      #   with:
      #     commit_message: "🤖 Auto-build PDF from CI/CD"
      #     file_pattern: "Book/build/informatics.pdf"
      #     branch: ${{ github.ref_name }}
      #     skip_checkout: false

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: informatics-pdf
          path: ./public

      - name: Create index.html with PDF viewer
        run: |
          cat > ./public/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ru">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Informatics Book</title>
              <style>
                  body { margin: 0; padding: 0; }
                  iframe { width: 100%; height: 100vh; border: none; }
              </style>
          </head>
          <body>
              <iframe src="informatics.pdf" title="Informatics Book PDF"></iframe>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
