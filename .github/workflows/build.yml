name: Build LaTeX PDF

on:
  push:
    branches: [master, main]
    paths:
      - "Book/**"
      - ".github/workflows/build.yml"

  pull_request:
    branches: [master, main]
    paths:
      - "Book/**"
      - ".github/workflows/build.yml"

  workflow_dispatch: # Ручной запуск

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pdf_name: ${{ steps.build.outputs.pdf_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true

      - name: Cache build directory
        id: cache-build
        uses: actions/cache@v4
        with:
          path: |
            Book/build
            Book/_minted-*
          key: ${{ runner.os }}-build-${{ hashFiles('Book/**/*.tex', 'Book/**/*.bib') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: Book
          compiler: latexmk
          args: "-pdf -jobname=informatics"
          extra_system_packages: "inkscape"
          latexmk_shell_escape: true

      - name: Show detailed error log
        if: failure()
        run: |
          grep -iE "error|fatal|undefined|not found|cannot find|missing|can't write" \
            Book/build/informatics.log || true

      - name: Show full log
        if: failure()
        run: |
          cat Book/build/informatics.log || true

      - name: Check for undefined references
        run: |
          if grep -qi "Reference.*undefined" Book/build/informatics.log; then
            echo "❌ Failed references!"
            grep -i "Reference.*undefined" Book/build/informatics.log
            exit 1
          fi
          if grep -qi "Citation.*undefined" Book/build/informatics.log; then
            echo "❌ Failed citations!"
            grep -i "Citation.*undefined" Book/build/informatics.log
            exit 1
          fi
          echo "✅ All references are correct"

      - name: Check for duplicate labels
        run: |
          DUPLICATES=$(grep -roh '\\label{[^}]*}' Book/ --include="*.tex" | sort | uniq -d)

          if [ -n "$DUPLICATES" ]; then
            echo "❌ Duplicate labels found:"
            echo "$DUPLICATES"
            exit 1
          else
            echo "✅ All labels are unique"
          fi

          if grep -q "multiply defined" Book/build/informatics.log; then
            echo "❌ Latex reported multiply defined labels!"
            grep "multiply defined" Book/build/informatics.log
            exit 1
          fi

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: informatics-pdf
          path: Book/build/informatics.pdf
          retention-days: 30
          if-no-files-found: error

      - name: Comment PR with PDF download link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const artifactName = 'informatics-pdf';
            const prNumber = context.issue.number;

            // Get artifact info
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: artifactName,
              per_page: 1
            });

            if (artifacts.data.artifacts.length === 0) {
              console.error('No artifacts found');
              return;
            }

            const artifact = artifacts.data.artifacts[0];
            const artifactId = artifact.id;
            const downloadUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/${context.runId}/artifacts/${artifactId}`;

            const commentBody = `## 📄 PDF собран\n\n[📥 Скачать informatics.pdf](${downloadUrl})\n\n> Артефакт доступен в течение 30 дней.`;

            // Check if we already commented
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const existingComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('📄 PDF собран')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
              console.log('Updated existing comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
              console.log('Created new comment');
            }

      # - name: Commit and push PDF
      #   uses: stefanzweifel/git-auto-commit-action@v5
      #   with:
      #     commit_message: "🤖 Auto-build PDF from CI/CD"
      #     file_pattern: "Book/build/informatics.pdf"
      #     branch: ${{ github.ref_name }}
      #     skip_checkout: false

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: informatics-pdf
          path: ./public

      - name: Create index.html with PDF viewer
        run: |
          cat > ./public/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ru">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Informatics Book</title>
              <style>
                  body { margin: 0; padding: 0; }
                  iframe { width: 100%; height: 100vh; border: none; }
              </style>
          </head>
          <body>
              <iframe src="informatics.pdf" title="Informatics Book PDF"></iframe>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
